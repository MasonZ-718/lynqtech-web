      - list [ref=e515]:
        - generic [ref=e516]:
          - button "How do I stop second-guessing myself after a big decision?" [ref=e517] [cursor=pointer]:
            - text: How do I stop second-guessing myself after a big decision?
            - img [ref=e518]
          - region:
            - paragraph [ref=e520]:
              - text: The most effective approach is to return to the reasoning you had
              - emphasis [ref=e521]: before
              - text: "doubt arrived — not the version of your thinking that doubt has rewritten. That's the core idea behind ReAnchor: record your decision at the moment of clarity, so when doubt hits later, you have an anchor. You're not fighting from memory. You're reading what you actually believed, in your own words, when you made the call."
        - generic [ref=e522]:
          - button "What is ReAnchor?" [ref=e523] [cursor=pointer]:
            - text: What is ReAnchor?
            - img [ref=e524]
          - region:
            - paragraph [ref=e526]: "ReAnchor is an iOS decision journal app. It gives you a structured place to record hard decisions — what you chose, why, how you felt, and what you feared — and then revisit them when doubt or outside pressure arrives. It includes a Doubt Review: 7 structured questions that help you figure out whether something actually changed, or whether it's just fear. Launching Spring 2026."
        - generic [ref=e527]:
          - button "How is this different from a regular journal?" [ref=e528] [cursor=pointer]:
            - text: How is this different from a regular journal?
            - img [ref=e529]
          - region:
            - paragraph [ref=e531]: "A journal captures how you feel. ReAnchor captures why you decided. The structure matters: every entry answers the same questions — what changed, what you feared, what you believed, why you were willing to risk it. That structure is what makes it useful when doubt arrives. You're not searching through pages of stream-of-consciousness. You're reading a record built for exactly this moment."
        - generic [ref=e532]:
          - button "What is a Doubt Review?" [ref=e533] [cursor=pointer]:
            - text: What is a Doubt Review?
            - img [ref=e534]
          - region:
            - paragraph [ref=e536]: "The Doubt Review is a 10-minute guided process built into ReAnchor. When doubt hits, you open the app, open the relevant decision, and answer 7 structured questions: Is this a new fact or a feeling? Did the original reasoning change? Are you reacting to one bad week or a real pattern? By the end, you'll know whether you should hold the line — or whether something genuinely changed and a reconsideration is warranted."
        - generic [ref=e537]:
