      - heading "Questions people ask before they join." [level=2] [ref=e463]:
        - text: Questions people ask
        - text: before they join.
      - list [ref=e464]:
        - generic [ref=e465]:
          - button "How do I stop second-guessing myself after a big decision?" [ref=e466] [cursor=pointer]:
            - text: How do I stop second-guessing myself after a big decision?
            - img [ref=e467]
          - region:
            - paragraph [ref=e469]:
              - text: The most effective approach is to return to the reasoning you had
              - emphasis [ref=e470]: before
              - text: "doubt arrived — not the version of your thinking that doubt has rewritten. That's the core idea behind ReAnchor: record your decision at the moment of clarity, so when doubt hits later, you have an anchor. You're not fighting from memory. You're reading what you actually believed, in your own words, when you made the call."
        - generic [ref=e471]:
          - button "What is ReAnchor?" [ref=e472] [cursor=pointer]:
            - text: What is ReAnchor?
            - img [ref=e473]
          - region:
            - paragraph [ref=e475]: "ReAnchor is an iOS decision journal app. It gives you a structured place to record hard decisions — what you chose, why, how you felt, and what you feared — and then revisit them when doubt or outside pressure arrives. It includes a Doubt Review: 7 structured questions that help you figure out whether something actually changed, or whether it's just fear. Launching Spring 2026."
        - generic [ref=e476]:
          - button "How is this different from a regular journal?" [ref=e477] [cursor=pointer]:
            - text: How is this different from a regular journal?
            - img [ref=e478]
          - region:
            - paragraph [ref=e480]: "A journal captures how you feel. ReAnchor captures why you decided. The structure matters: every entry answers the same questions — what changed, what you feared, what you believed, why you were willing to risk it. That structure is what makes it useful when doubt arrives. You're not searching through pages of stream-of-consciousness. You're reading a record built for exactly this moment."
        - generic [ref=e481]:
          - button "What is a Doubt Review?" [ref=e482] [cursor=pointer]:
            - text: What is a Doubt Review?
            - img [ref=e483]
          - region:
            - paragraph [ref=e485]: "The Doubt Review is a 10-minute guided process built into ReAnchor. When doubt hits, you open the app, open the relevant decision, and answer 7 structured questions: Is this a new fact or a feeling? Did the original reasoning change? Are you reacting to one bad week or a real pattern? By the end, you'll know whether you should hold the line — or whether something genuinely changed and a reconsideration is warranted."
        - generic [ref=e486]:
          - button "Is my data private? Who can see my decisions?" [ref=e487] [cursor=pointer]:
            - text: Is my data private? Who can see my decisions?
            - img [ref=e488]
          - region:
            - paragraph [ref=e490]: "Nobody. All data in ReAnchor stays on your device — no cloud sync, no server uploads, no account required. Your decisions are yours. This is a deliberate design choice: the things you record in ReAnchor are some of the most personal thoughts you'll ever write down. They should never leave your phone."
        - generic [ref=e491]:
          - button "When does ReAnchor launch, and is it free?" [ref=e492] [cursor=pointer]:
            - text: When does ReAnchor launch, and is it free?
            - img [ref=e493]
          - region:
            - paragraph [ref=e495]: ReAnchor launches on iOS in Spring 2026. Join the waitlist to get early access. Pricing will be announced at launch — waitlist members get first access and any early-adopter pricing.
