    - region "Why I Walked Away" [ref=e39]:
      - generic [ref=e40]: Why I Walked Away
      - paragraph [ref=e41]: At BCG, I sat in rooms where the world's most complex decisions were made — with data, frameworks, and billions on the line.
      - paragraph [ref=e42]:
        - text: But what struck me wasn't how well people decided. It was how much they struggled
        - emphasis [ref=e43]: after
        - text: — relitigating calls that were already made, letting doubt quietly undo clarity. Not because they lacked intelligence. Because decisions are not purely logical. And nobody had built anything to help with that.
      - figure "\"The hard part wasn't deciding to leave. It was the weeks after — when I'd already decided, but my mind kept relitigating it. That loop is why ReAnchor exists.\"" [ref=e44]:
        - generic [ref=e45]: "\"The hard part wasn't deciding to leave. It was the weeks after — when I'd already decided, but my mind kept relitigating it. That loop is why ReAnchor exists.\""
    - region "What I Believe" [ref=e46]:
      - generic [ref=e47]: What I Believe
      - paragraph [ref=e48]: Better decisions don't come from more information. They come from clarity.
      - generic [ref=e49]:
        - generic [ref=e50]:
          - generic [ref=e51]: Clarity over analysis
          - generic [ref=e52]: Most people already know what they want. They need structure to hear themselves — not more data.
        - generic [ref=e53]:
          - generic [ref=e54]: Emotion is signal, not noise
          - generic [ref=e55]: Feelings are information. The goal isn't to eliminate them — it's to stop letting temporary ones overwrite permanent decisions.
        - generic [ref=e56]:
          - generic [ref=e57]: Technology should support humans, not replace them
          - generic [ref=e58]: The best tools give you back your own thinking. They don't think for you.
