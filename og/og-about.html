<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #09090b;
    font-family: 'DM Sans', -apple-system, sans-serif;
    position: relative;
    overflow: hidden;
    padding: 0 88px;
    display: flex;
    align-items: center;
  }
  /* Ambient glow behind the portrait */
  body::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 72%;
    transform: translate(-50%, -50%);
    width: 580px;
    height: 580px;
    background: radial-gradient(ellipse at center, rgba(52,211,153,0.13) 0%, rgba(52,211,153,0.02) 45%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(244,244,245,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,244,245,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at 70% 50%, black 35%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at 70% 50%, black 35%, transparent 80%);
    pointer-events: none;
  }
  .brand {
    position: absolute;
    top: 44px;
    left: 56px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    z-index: 2;
  }
  .brand-mark {
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .brand-mark svg { width: 22px; height: 22px; }
  .brand-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #f4f4f5;
    letter-spacing: 0.2px;
  }
  .brand-name em {
    font-style: normal;
    color: #34d399;
  }
  .split {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 72px;
    align-items: center;
    position: relative;
    z-index: 1;
    width: 100%;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3.2px;
    text-transform: uppercase;
    color: rgba(52, 211, 153, 0.9);
    margin-bottom: 20px;
    padding: 6px 14px;
    border: 1px solid rgba(52, 211, 153, 0.25);
    border-radius: 999px;
    background: rgba(52, 211, 153, 0.05);
  }
  .eyebrow-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #34d399;
    box-shadow: 0 0 8px rgba(52, 211, 153, 0.6);
  }
  .name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 68px;
    font-weight: 300;
    color: #f4f4f5;
    line-height: 1.02;
    letter-spacing: -1px;
    margin-bottom: 14px;
  }
  .role {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px;
    color: #a1a1aa;
    font-style: italic;
    font-weight: 400;
    margin-bottom: 28px;
  }
  .creds {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
  }
  .cred-chip {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #e4e4e7;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid #27272a;
    background: rgba(24,24,27,0.7);
  }
  .bio {
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    color: #a1a1aa;
    line-height: 1.55;
    max-width: 460px;
  }
  .bio strong {
    color: #f4f4f5;
    font-weight: 500;
  }
  .right {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .portrait {
    width: 300px;
    height: 360px;
    background: linear-gradient(160deg, #1c1c20 0%, #121214 100%);
    border: 1px solid #27272a;
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(52,211,153,0.06),
      0 40px 80px -20px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(244,244,245,0.04);
  }
  .portrait::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(52,211,153,0.12) 0%, transparent 55%);
  }
  .portrait::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(244,244,245,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,244,245,0.018) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .monogram {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: 180px;
    letter-spacing: -8px;
    color: #f4f4f5;
    line-height: 1;
    z-index: 1;
    background: linear-gradient(180deg, #f4f4f5 0%, #a1a1aa 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .portrait-label {
    position: absolute;
    bottom: 18px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(244, 244, 245, 0.35);
    z-index: 2;
  }
  .footer {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 56px;
    z-index: 2;
  }
  .footer-url {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #71717a;
    letter-spacing: 0.4px;
  }
  .footer-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #52525b;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .corner-tl {
    position: absolute;
    top: 0;
    left: 0;
    width: 140px;
    height: 140px;
    border-top: 1px solid rgba(52,211,153,0.22);
    border-left: 1px solid rgba(52,211,153,0.22);
  }
  .corner-br {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 100px;
    height: 100px;
    border-bottom: 1px solid rgba(52,211,153,0.12);
    border-right: 1px solid rgba(52,211,153,0.12);
  }
</style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="brand">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="11" stroke="#34d399" stroke-width="1.5" opacity="0.35"/>
        <circle cx="12" cy="12" r="5" fill="#34d399"/>
      </svg>
    </span>
    <span class="brand-name">Lynq<em>Tech</em></span>
  </div>

  <div class="split">
    <div class="left">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        Founder
      </div>
      <h1 class="name">Mason Zhou</h1>
      <p class="role">Founder of LynqTech</p>
      <div class="creds">
        <span class="cred-chip">BCG Alumnus</span>
        <span class="cred-chip">IESE MBA</span>
        <span class="cred-chip">Barcelona / SF</span>
      </div>
      <p class="bio">Building tools that help people think more clearly <strong>at the moments that matter most</strong> — especially the decisions that keep you up at 2am.</p>
    </div>
    <div class="right">
      <div class="portrait">
        <div class="monogram">MZ</div>
        <div class="portrait-label">Founder · 2026</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-url">lynqtech.io/about</span>
    <span class="footer-tag">People · LynqTech</span>
  </div>
</body>
</html>
