<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #09090b;
    font-family: 'DM Sans', -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(ellipse at center, rgba(52,211,153,0.11) 0%, transparent 65%);
    animation: glowPulse 7s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
  }
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(52,211,153,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(52,211,153,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .inner {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
  }
  .product-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(52, 211, 153, 0.75);
    margin-bottom: 28px;
  }
  .product-label-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #34d399;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .headline {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 68px;
    font-weight: 300;
    color: #f4f4f5;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 20px;
  }
  .headline em {
    font-style: italic;
    color: #a1a1aa;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 36px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .stat-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 36px;
    font-weight: 600;
    color: #34d399;
    line-height: 1;
  }
  .stat-label {
    font-size: 13px;
    color: #71717a;
  }
  .stat-divider {
    width: 1px;
    height: 40px;
    background: #27272a;
    align-self: center;
  }
  .dimensions {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }
  .dim-chip {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid #27272a;
    color: #a1a1aa;
  }
  .dim-chip.dim-1 { color: #60a5fa; border-color: rgba(96,165,250,0.25); background: rgba(96,165,250,0.06); }
  .dim-chip.dim-2 { color: #fb7185; border-color: rgba(251,113,133,0.25); background: rgba(251,113,133,0.06); }
  .dim-chip.dim-3 { color: #fbbf24; border-color: rgba(251,191,36,0.25); background: rgba(251,191,36,0.06); }
  .dim-chip.dim-4 { color: #a78bfa; border-color: rgba(167,139,250,0.25); background: rgba(167,139,250,0.06); }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #34d399;
    color: #09090b;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 999px;
  }
  .corner-tl {
    position: absolute;
    top: 40px;
    left: 40px;
    width: 80px;
    height: 80px;
    border-top: 1px solid rgba(52,211,153,0.12);
    border-left: 1px solid rgba(52,211,153,0.12);
  }
  .corner-br {
    position: absolute;
    bottom: 40px;
    right: 40px;
    width: 80px;
    height: 80px;
    border-bottom: 1px solid rgba(52,211,153,0.08);
    border-right: 1px solid rgba(52,211,153,0.08);
  }
</style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="inner">
    <div class="product-label">
      <span class="product-label-dot"></span>
      ReAnchor · Free Self-Test
    </div>
    <h1 class="headline">How Much Is Doubt<br><em>Costing You?</em></h1>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-num">16</span>
        <span class="stat-label">questions</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num">~3</span>
        <span class="stat-label">minutes</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-num">4</span>
        <span class="stat-label">dimensions</span>
      </div>
    </div>
    <div class="dimensions">
      <span class="dim-chip dim-1">Analysis Paralysis</span>
      <span class="dim-chip dim-2">Post-Decision Rumination</span>
      <span class="dim-chip dim-3">Maximizing Tendency</span>
      <span class="dim-chip dim-4">Avoidance &amp; Approval</span>
    </div>
    <div class="cta">Take the Free Test →</div>
  </div>
</body>
</html>
