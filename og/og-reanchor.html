<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #09090b;
    font-family: 'DM Sans', -apple-system, sans-serif;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: 46%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 820px;
    height: 820px;
    background: radial-gradient(ellipse at center, rgba(52,211,153,0.18) 0%, rgba(52,211,153,0.03) 40%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(244,244,245,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,244,245,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 38%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 38%, transparent 85%);
    pointer-events: none;
  }
  /* Anchor watermark, intentional and visible enough to read as a device */
  .anchor-watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    opacity: 0.07;
  }
  .anchor-watermark svg {
    width: 520px;
    height: 520px;
  }
  .brand {
    position: absolute;
    top: 44px;
    left: 56px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    z-index: 2;
  }
  .brand-mark {
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .brand-mark svg { width: 22px; height: 22px; }
  .brand-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #f4f4f5;
    letter-spacing: 0.2px;
  }
  .brand-name em {
    font-style: normal;
    color: #34d399;
  }
  .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 1;
    padding: 0 80px;
  }
  .product-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #34d399;
    background: rgba(52, 211, 153, 0.08);
    border: 1px solid rgba(52, 211, 153, 0.28);
    border-radius: 999px;
    padding: 7px 18px;
    margin-bottom: 32px;
  }
  .product-label-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #34d399;
    box-shadow: 0 0 10px rgba(52, 211, 153, 0.7);
  }
  .headline {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 92px;
    font-weight: 300;
    color: #f4f4f5;
    line-height: 1.0;
    letter-spacing: -2.5px;
    margin-bottom: 28px;
  }
  .headline em {
    font-style: italic;
    font-weight: 300;
    color: #34d399;
    display: inline-block;
  }
  .subline {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    color: #a1a1aa;
    line-height: 1.5;
    max-width: 680px;
    margin: 0 auto 40px;
  }
  .cta-row {
    display: inline-flex;
    align-items: center;
    gap: 18px;
  }
  .cta-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #34d399;
    color: #09090b;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 26px;
    border-radius: 999px;
    letter-spacing: 0.3px;
    box-shadow: 0 10px 30px -10px rgba(52, 211, 153, 0.5);
  }
  .cta-meta {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #71717a;
    letter-spacing: 0.3px;
  }
  .footer {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 56px;
    z-index: 2;
  }
  .footer-url {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #71717a;
    letter-spacing: 0.4px;
  }
  .footer-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #52525b;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .corner-tl {
    position: absolute;
    top: 0;
    left: 0;
    width: 140px;
    height: 140px;
    border-top: 1px solid rgba(52,211,153,0.22);
    border-left: 1px solid rgba(52,211,153,0.22);
  }
  .corner-br {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 100px;
    height: 100px;
    border-bottom: 1px solid rgba(52,211,153,0.12);
    border-right: 1px solid rgba(52,211,153,0.12);
  }
</style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="anchor-watermark" aria-hidden="true">
    <svg viewBox="0 0 100 100" fill="none">
      <path d="M50 5 L50 78 M32 20 Q32 50 50 50 Q68 50 68 20" stroke="#34d399" stroke-width="3" stroke-linecap="round" fill="none"/>
      <circle cx="50" cy="83" r="10" fill="#34d399"/>
    </svg>
  </div>

  <div class="brand">
    <span class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="11" stroke="#34d399" stroke-width="1.5" opacity="0.35"/>
        <circle cx="12" cy="12" r="5" fill="#34d399"/>
      </svg>
    </span>
    <span class="brand-name">Lynq<em>Tech</em></span>
  </div>

  <div class="center">
    <div class="product-label">
      <span class="product-label-dot"></span>
      ReAnchor · iOS · Spring 2026
    </div>
    <h1 class="headline">Stop<br><em>Second-Guessing</em><br>Yourself</h1>
    <p class="subline">Record your decisions at the moment of clarity. Return to them when doubt shows up at 2am.</p>
    <div class="cta-row">
      <span class="cta-pill">Join the Waitlist →</span>
      <span class="cta-meta">reanchor.app</span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-url">lynqtech.io/reanchor</span>
    <span class="footer-tag">A LynqTech product</span>
  </div>
</body>
</html>
