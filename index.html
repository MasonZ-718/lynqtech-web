<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lynq Tech</title>
  <meta name="description" content="Lynq Tech — building tools for clearer thinking." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #09090b;
      color: #f4f4f5;
      font-family: -apple-system, 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
      text-align: center;
    }
    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #34d399;
    }
    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 400;
      color: #f4f4f5;
      line-height: 1.3;
      max-width: 520px;
    }
    p {
      font-size: 17px;
      color: #71717a;
      max-width: 400px;
      line-height: 1.7;
    }
    .products {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }
    .product-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 14px;
      padding: 18px 24px;
      text-decoration: none;
      transition: border-color 0.15s;
      width: 320px;
    }
    .product-link:hover { border-color: rgba(52,211,153,0.35); }
    .product-name {
      font-size: 15px;
      font-weight: 600;
      color: #f4f4f5;
    }
    .product-desc {
      font-size: 13px;
      color: #71717a;
      margin-top: 2px;
    }
    .product-arrow { color: #34d399; font-size: 18px; }
  </style>
</head>
<body>
  <p class="brand">Lynq Tech</p>
  <h1>Building tools for clearer thinking.</h1>
  <p>Small, focused products for the decisions and moments that matter.</p>
  <div class="products">
    <a href="/mydecision" class="product-link">
      <div>
        <div class="product-name">MyDecision</div>
        <div class="product-desc">An anchor for your decisions</div>
      </div>
      <span class="product-arrow">→</span>
    </a>
  </div>
</body>
</html>
