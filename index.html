  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #09090b;
      --surface:        #18181b;
      --surface-2:      #1c1c1f;
      --border:         #27272a;
      --border-subtle:  #1f1f22;
      --text:           #f4f4f5;
      --muted:          #a1a1aa;
      --dim:            #71717a;
      --accent:         #34d399;
      --accent-text:    rgba(52, 211, 153, 0.82);
      --accent-glow:    rgba(52, 211, 153, 0.10);
      --accent-border:  rgba(52, 211, 153, 0.22);
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, sans-serif;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 220px 220px;
    }

    /* Atmospheric glow */
    body::before {
      content: '';
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(52,211,153,0.055) 0%, transparent 65%);
      pointer-events: none;
    }

    .inner {
      max-width: 480px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 40px;
      position: relative;
      z-index: 1;
    }

    /* Header block */
    .header {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent-text);
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(32px, 6vw, 54px);
      font-weight: 300;
      color: var(--text);
      line-height: 1.12;
      letter-spacing: -0.6px;
    }

    h1 em {
      font-style: italic;
      color: var(--muted);
    }

    .sub {
      font-size: 15px;
      color: var(--dim);
      line-height: 1.7;
      max-width: 340px;
    }

    /* Divider */
    .rule {
      width: 40px;
      height: 1px;
      background: var(--border);
    }

    /* Products */
    .products {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .products-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }

    .product-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
      gap: 16px;
    }

    .product-link:hover {
      border-color: var(--accent-border);
      background: var(--surface-2);
      box-shadow: 0 4px 24px rgba(52, 211, 153, 0.06);
    }

    .product-info { display: flex; flex-direction: column; gap: 4px; }

    .product-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .product-desc {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 13px;
      font-style: italic;
      color: var(--dim);
    }

    .product-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-glow);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      padding: 3px 8px;
      flex-shrink: 0;
    }

    /* Footer */
    .footer {
      font-size: 12px;
      color: #3f3f46;
    }
  </style>
</head>
<body>
  <div class="inner">
    <div class="header">
      <span class="brand">Lynq Tech</span>
      <h1>Building tools for<br /><em>clearer thinking.</em></h1>
      <p class="sub">Small, focused products for the decisions and moments that matter.</p>
    </div>

    <div class="rule"></div>

    <div class="products">
      <p class="products-label">Products</p>
      <a href="/reanchor" class="product-link">
        <div class="product-info">
          <span class="product-name">ReAnchor</span>
          <span class="product-desc">Stop second-guessing yourself</span>
        </div>
        <span class="product-badge">Waitlist</span>
      </a>
    </div>

    <p class="footer">© 2026 Lynq Tech</p>
  </div>
</body>
